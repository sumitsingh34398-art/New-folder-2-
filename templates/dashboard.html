{% extends 'base.html' %}
{% block content %}
<h2>My Event Dashboard</h2>
<table class="table table-hover mt-3">
    <thead class="table-dark"><tr><th>Title</th><th>Category</th><th>Venue</th><th>Actions</th></tr></thead>
    <tbody>
        {% for e in events %}
        <tr>
            <td>{{ e.title }}</td><td>{{ e.category }}</td><td>{{ e.venue }}</td>
            <td><a href="/delete-event/{{ e.id }}" class="btn btn-danger btn-sm">Delete</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
