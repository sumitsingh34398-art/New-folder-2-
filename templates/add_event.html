{% extends 'base.html' %}

{% block content %}
<div class="card p-4">
    <h2>Add New Event</h2>
    <form action="/add-event" method="POST">
        <div class="mb-3">
            <input type="text" name="title" class="form-control" placeholder="Event Title" required>
        </div>
        <div class="mb-3">
            <input type="text" name="category" class="form-control" placeholder="Category">
        </div>
        <div class="mb-3">
            <input type="text" name="organizer" class="form-control" placeholder="Organizer">
        </div>
        <div class="mb-3">
            <input type="date" name="date" class="form-control">
        </div>
        <div class="mb-3">
            <input type="text" name="venue" class="form-control" placeholder="Venue">
        </div>
        <div class="mb-3">
            <textarea name="description" class="form-control" placeholder="Description"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Event</button>
    </form>
</div>
{% endblock %}
